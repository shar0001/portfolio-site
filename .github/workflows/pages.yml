name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/portfolio-site-access-bBN91, claude/new-app-project-vdH0J]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/configure-pages@v5

      # ── 本体ポートフォリオをビルド（/portfolio-site/） → ./out ──
      - run: npm ci

      - run: npm run build

      # ── ロケボードをビルドして /portfolio-site/rokeboard/ に配置 ──
      - name: Build rokeboard
        working-directory: rokeboard
        run: |
          npm ci
          npm run build

      - name: Place rokeboard under /rokeboard
        run: |
          mkdir -p out/rokeboard
          cp -r rokeboard/out/. out/rokeboard/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
